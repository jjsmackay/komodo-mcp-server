name: Publish to MCP Registry

# Publishes to the official MCP Registry after npm publication.
# Prerequisites:
# 1. Package published to npm (triggered by publish-npm.yml)
# 2. server.json in repository root with mcpName matching package.json
# 3. GitHub OIDC authentication for io.github.mp-tool namespace
#
# References:
# - Quickstart: https://modelcontextprotocol.io/docs/registry/quickstart
# - GitHub Actions: https://modelcontextprotocol.io/docs/registry/github-actions
# - Schema: https://static.modelcontextprotocol.io/schemas/2025-12-11/server.schema.json

on:
  # Triggered after npm publish workflow completes
  workflow_run:
    workflows: ['Publish to npm']
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (leave empty to use package.json version)'
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  MCP_REGISTRY_API: https://registry.modelcontextprotocol.io
  NAMESPACE: io.github.mp-tool
  PACKAGE_NAME: komodo-mcp-server

jobs:
  publish:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run if npm publish succeeded or manual dispatch
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get version from package.json
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Get version from package.json when triggered by workflow_run
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Publishing version: $VERSION"

      - name: Update server.json with current version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Update all version fields in server.json
          jq --arg v "$VERSION" '
            .version = $v |
            .packages[0].version = $v |
            .packages[1].identifier = "ghcr.io/mp-tool/komodo-mcp-server:\($v)" |
            .packages[1].version = $v
          ' server.json > server.tmp && mv server.tmp server.json
          
          echo "✅ Updated server.json to version $VERSION"
          echo "📋 server.json contents:"
          cat server.json

      - name: Validate server.json
        run: |
          if [ ! -f "server.json" ]; then
            echo "❌ server.json not found"
            exit 1
          fi
          
          # Validate mcpName matches in package.json and server.json
          PACKAGE_MCP_NAME=$(node -p "require('./package.json').mcpName")
          SERVER_NAME=$(jq -r '.name' server.json)
          
          if [ "$PACKAGE_MCP_NAME" != "$SERVER_NAME" ]; then
            echo "❌ mcpName mismatch!"
            echo "   package.json mcpName: $PACKAGE_MCP_NAME"
            echo "   server.json name:     $SERVER_NAME"
            exit 1
          fi
          
          echo "✅ server.json validated"
          echo "   Name: $SERVER_NAME"
          echo "   Version: $(jq -r '.version' server.json)"

      - name: Install mcp-publisher
        env:
          # Pinned to a specific release for reproducibility (Scorecard: Pinned-Dependencies).
          # When upgrading, also update MCP_PUBLISHER_SHA256 below.
          # Compute new checksum:
          #   curl -sL "https://github.com/modelcontextprotocol/registry/releases/download/<TAG>/mcp-publisher_linux_amd64.tar.gz" | sha256sum
          MCP_PUBLISHER_VERSION: v1.7.8
          MCP_PUBLISHER_SHA256: 48230dbec85bd88a0d42977ef533cddda23235f0db4331b9263ce53b432cb75c
        run: |
          set -euo pipefail
          ARCHIVE="mcp-publisher_linux_amd64.tar.gz"
          URL="https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/${ARCHIVE}"

          echo "⬇️  Downloading mcp-publisher ${MCP_PUBLISHER_VERSION}..."
          curl --fail --location --silent --show-error --output "${ARCHIVE}" "${URL}"

          echo "🔎 Verifying checksum..."
          echo "${MCP_PUBLISHER_SHA256}  ${ARCHIVE}" | sha256sum --check --status

          echo "📦 Extracting..."
          tar -xzf "${ARCHIVE}" mcp-publisher
          rm -f "${ARCHIVE}"
          chmod +x mcp-publisher

          echo "✅ mcp-publisher ${MCP_PUBLISHER_VERSION} installed"
          ./mcp-publisher --help

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## ✅ Published to MCP Registry
          
          **Server:** \`${{ env.NAMESPACE }}/${{ env.PACKAGE_NAME }}@${VERSION}\`
          
          **Packages:**
          - npm: \`komodo-mcp-server@${VERSION}\`
          - OCI: \`ghcr.io/mp-tool/komodo-mcp-server:${VERSION}\`
          
          **Verify publication:**
          \`\`\`bash
          curl "https://registry.modelcontextprotocol.io/v0.1/servers?search=${{ env.NAMESPACE }}/${{ env.PACKAGE_NAME }}"
          \`\`\`
          
          [View in Registry](https://registry.modelcontextprotocol.io)
          EOF
